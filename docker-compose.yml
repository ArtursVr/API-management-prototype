version: '3.8'

services:
  status-service:
    build: ./status-service
    ports:
      - "3001:3001"

  payment-service:
    build: ./payment-service
    ports:
      - "3002:3002"

  orchestrator:
    build: ./orchestrator
    ports:
      - "3000:3000"
    depends_on:
      - status-service
      - payment-service

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - orchestrator